<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - API Integration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="site-name">Student Portal</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#" class="active">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero Section -->
        <section id="hero">
            <h1>Welcome to the Student Portal</h1>
            <p>Your gateway to academic success. Manage your courses, track grades, and stay informed.</p>
            <button>Explore Courses</button>
        </section>

        <!-- Courses Section -->
        <section id="courses">
            <h2>My Courses</h2>
            <div id="loading-message">Loading courses...</div>
            <div class="course-grid"></div>
            <p id="total-credits"></p>
        </section>

        <!-- Notifications Section -->
        <section id="notifications">
            <h2>Notifications</h2>
            <div id="notification-container"></div>
            <div id="notification-error"></div>
            <button id="retry-notifications" style="display:none;">Retry</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Portal. All rights reserved.</p>
    </footer>

    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
